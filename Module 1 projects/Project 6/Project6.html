    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration from</title>
    </head>
    <body>
        <h1>Fill up all the details.</h1>
        <form>
            <fieldset>
                <legend>Personal Information:</legend>
        
                <label for="first name">First name:</label> 
                <input type="text" id="fname" name="fname"><br><br>

                <label for="middle name">Middle name(Optional):</label> 
                <input type="text" id="midname" name="midname"><br><br>

                <label for="last name">Last name:</label>
                <input type="text" id="lname" name="lname"> <br><br>

                <label>Gender:</label><br><br>
                <input type="radio" name="gender" value="Male"> Male<br>
                <input type="radio" name="gender" value="Female"> Female<br>
                <input type="radio" name="gender" value="Other"> Other<br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email"><br><br>

                <label for="email">Password:</label>
                <input type="password" name="password"><br><br>

                <label for="birth date">Birth date:</label>
                <input type="date" id="birth date" name="birth date"><br><br>

                <label for="email">Address:</label><br />
                <textarea rows="5" cols="50" name="description">Enter your address here...</textarea><br><br>
                
                <center>
                    <input type="submit" name="submit" value="Submit" />
                </center>
            </fieldset>
        </form>
    </body>
    </html>
