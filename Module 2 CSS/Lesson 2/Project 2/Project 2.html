<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style2.css">
    </head>
<body>

    <h1>My Weather App</h1>
    
    <div class="weather-card">
        <h2>Today's Weather</h2>

        <div class="weather-icon">Clear</div>

        <p id="temperature">22°C</p>

        <p class="details">Current place:Kathmandu</p>
        <p class="details">Condition: Mostly Clear</p>
        <p class="details">Humidity: 94%</p>
    </div>

    <h1>Weekly Forecast</h1>

    <div class="forecast-section">
        <h3 class="forecast-title">Next 5 Days</h3>

        <p class="day">Thursday: Sunny, 20°- 29°C</p>
        <p class="day">Friday: Cloudy, 21°- 29°C</p>
        <p class="day">Saturday: Rainy, 21°- 28°</p>
        <p class="day"> Sunday: Rainy, 21°- 28°</p>
        <p class="day">Monday: Cloudy, 21°- 29°C</p>
    </div>

</body>

</html>
