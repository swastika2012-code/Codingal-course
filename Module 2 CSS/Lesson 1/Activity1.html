<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MODULE 2 - LESSON 1 - ACTIVITY 1 - My Colour Card</title>

    <!-- INTERNAL CSS -->
    <style>
        /* Add Universal Selector - applies to everything on the page */
*{
    font-size: 25px;
    font-weight: bold;
}
        /* Add Element Selectors */
        body{
            background-color:rgb(207, 179, 209)
        }
        h1{
            color:blueviolet
        }
        p{
            color:darkmagenta
        }

        /* Add Class Selector */
.my-detail{
    color:palevioletred
}
        /* Add ID Selector */
        #my-card {
           background-color:paleturquoise;
        }
    </style>

</head>

<body>
    <h1>My Colour Card</h1>

    <!-- Inline CSS: Add style="color: ____;" inside this p tag -->
    <p style="color:#6d37a3"> Hi! This is my very own webpage.</p>
    

    <div id="my-card">
        <h2>About Me</h2>
        <p class="my-detail">My name is Sam.</p>
        <p class="my-detail">My favourite colour is red.</p>
        <p class="my-detail">My favourite subject is Maths.</p>
        <p class="my-detail">My favourite food is pasta.</p>
    </div>

    <h2>My Favourite Things</h2>
    <p>My favourite animal is a cat.</p>
    <p>My favourite sport is cricket.</p>
    <p>My favourite movie is The Lion King.</p>
</body>
