<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Module 1 Lesson 6 Activity 1 - Personal Details Form</title>
</head>

<body>
    <h1>Personal Details Form</h1>


    <form>
        <fieldset>
       <legend><h5>Fill all the details below</h5></legend>
        <label for="name">Name</label> <br />
        <!-- ADD AN INPUT - SIMPLE TEXT TYPE -->
        <input type="text" id="name" name="name">
        <br /><br />

        <label for="email">Email ID</label> <br />
        <!-- ADD AN INPUT - EMAIL TYPE -->
        <input type="email" id="email" name="email">
        <br /><br />

        <label for="contact">Contact Number (We won't reveal)</label> <br />
        <!-- ADD AN INPUT - PASSWORD TYPE -->
        <input type="password" id="contact" name="contact">
        <br /><br />

        Gender <br />
   
        <!-- ADD A LABELS/INPUTS - RADIO TYPE -->
<label>
    <input type="radio" name="gender" id="male">Male
</label>
<br>
<label>
    <input type="radio" name="gender" id="female">Female
</label>
<br>
<label>
    <input type="radio" name="gender" id="Other">Other
</label>
        <br /><br />

        Favorite food<br />
        <!-- ADD A LABELS/INPUTS - CHECKBOX TYPE -->
        <label>
            <input type="checkbox" name="food" id="M">Mango
        </label>
        <br>
        <label>
            <input type="checkbox" name="food" id="A">Apple
        </label>
        <br>
        <label>
            <input type="checkbox" name="food" id="B">Banana
        </label>
        <br /><br />
<input type="Submit" value="Create a new account">
</fieldset>
    </form>
</body>

</html>
